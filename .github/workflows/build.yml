name: Build Android APK from ZIP on: push: branches: [main, master] workflow_dispatch: jobs: build: runs-on: ubuntu-latest steps: - name: Checkout repository uses: actions/checkout@v4 - name: Find and extract project ZIP run: | ZIP_FILE=$(find . -maxdepth 1 \( -name "chatgpt-pro-tools-android.zip" -o -name "chatgpt-pro-tools-android-upload-this.zip" \) -type f | head -n 1) if [ -z "$ZIP_FILE" ]; then echo "ERROR: Project ZIP not found in the repository root." echo "Please upload chatgpt-pro-tools-android.zip or chatgpt-pro-tools-android-upload-this.zip and try again." exit 1 fi echo "Found ZIP: $ZIP_FILE" unzip -q "$ZIP_FILE" -d ./extracted if [ -d "./extracted/chatgpt-pro-tools-android" ]; then mv ./extracted/chatgpt-pro-tools-android/* . mv ./extracted/chatgpt-pro-tools-android/.[!.]* . 2>/dev/null || true fi rm -rf ./extracted ls -la - name: Set up JDK 17 uses: actions/setup-java@v4 with: java-version: '17' distribution: 'temurin' - name: Set up Android SDK uses: android-actions/setup-android@v3 - name: Install required SDK components run: | sdkmanager "platforms;android-34" "build-tools;34.0.0" - name: Grant execute permission for Gradle wrapper run: chmod +x gradlew - name: Build debug APK run: ./gradlew assembleDebug --stacktrace - name: Upload APK artifact uses: actions/upload-artifact@v4 with: name: app-debug-apk path: app/build/outputs/apk/debug/app-debug.apk if-no-files-found: error
